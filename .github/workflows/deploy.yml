name: Deploy Frontend

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      AWS_REGION: us-west-2
      S3_BUCKET: ${{ github.ref_name == 'main' && secrets.PROD_S3_BUCKET || secrets.STAGING_S3_BUCKET }}
      VITE_BACKEND_URL: ${{ github.ref_name == 'main' && 'https://api.mythex.ai' || 'https://staging.api.mythex.ai' }}
      VITE_BACKEND_WS_URL: ${{ github.ref_name == 'main' && 'wss://api.mythex.ai' || 'wss://staging.api.mythex.ai' }}
      VITE_APP_DOMAIN: ${{ github.ref_name == 'main' && 'app.mythex.ai' || 'staging.app.mythex.ai' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          VITE_BACKEND_URL: ${{ env.VITE_BACKEND_URL }}
          VITE_BACKEND_WS_URL: ${{ env.VITE_BACKEND_WS_URL }}
          VITE_APP_DOMAIN: ${{ env.VITE_APP_DOMAIN }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/assets/ s3://${{ env.S3_BUCKET }}/assets/ \
            --delete \
            --cache-control "max-age=31536000,immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Sync remaining files
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'

      - name: Summary
        run: echo "Deployed frontend ${{ github.sha }} to ${{ github.ref_name == 'main' && 'production' || 'staging' }} (s3://${{ env.S3_BUCKET }})"
