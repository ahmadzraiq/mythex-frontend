name: Deploy Frontend

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      VITE_BACKEND_URL: ${{ github.ref_name == 'main' && 'https://api.mythex.ai' || 'https://staging.api.mythex.ai' }}
      VITE_BACKEND_WS_URL: ${{ github.ref_name == 'main' && 'wss://api.mythex.ai' || 'wss://staging.api.mythex.ai' }}
      VITE_APP_DOMAIN: ${{ github.ref_name == 'main' && 'app.mythex.ai' || 'staging.app.mythex.ai' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          VITE_BACKEND_URL: ${{ env.VITE_BACKEND_URL }}
          VITE_BACKEND_WS_URL: ${{ env.VITE_BACKEND_WS_URL }}
          VITE_APP_DOMAIN: ${{ env.VITE_APP_DOMAIN }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mythex-app
          directory: dist
          branch: ${{ github.ref_name }}
